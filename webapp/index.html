  <!-- ============================================ -->
  <!-- APP HEADER -->
  <!-- ============================================ -->

        <img src="icons/icon-192.png" alt="Logo" class="header-logo" id="header-logo">
        <div class="header-title-group">

        <button class="notification-bell" id="notification-bell" aria-label="Notificaciones">

  <!-- ============================================ -->
  <!-- MAIN CONTENT AREA -->
  <!-- ============================================ -->
  <main id="app-content" class="app-content">
    <div id="view-container" class="view-container">
      <!-- Views are dynamically loaded here -->
      <div id="loading-skeleton" class="skeleton-container">

        <div class="skeleton skeleton-card"></div>

  <!-- ============================================ -->
  <!-- BOTTOM NAVIGATION -->

  <nav id="bottom-nav" class="bottom-nav" aria-label="Navegación principal">

      <span class="nav-label">Inicio</span>
      <span class="nav-indicator"></span>
    </button>
    <button class="nav-item" data-view="pronosticos" id="nav-pronosticos" aria-label="Pronósticos">
      <span class="nav-icon">⚽</span>
      <span class="nav-label">Pronósticos</span>
      <span class="nav-indicator"></span>
    </button>
    <button class="nav-item" data-view="ranking" id="nav-ranking" aria-label="Ranking">

    <button class="nav-item" data-view="config" id="nav-config" aria-label="Configuración">
      <span class="nav-icon">⚙️</span>

  <!-- ============================================ -->
  <!-- TOAST CONTAINER -->
  <!-- ============================================ -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ============================================ -->
  <!-- PWA INSTALL PROMPT -->
  <!-- ============================================ -->
  <div id="install-prompt" class="install-banner" style="display: none;">
    <div class="install-banner-content">
      <div class="install-banner-icon">
        <img src="icons/icon-192.png" alt="PRODE" class="install-banner-logo">
      </div>
      <div class="install-banner-text">
        <strong>Instalar PRODE 2026</strong>
        <p>Acceso rápido desde tu pantalla de inicio</p>
      </div>
      <div class="install-banner-actions">
        <button class="btn btn-outline btn-sm" id="install-dismiss">No ahora</button>
        <button class="btn btn-gold btn-sm" id="install-accept">Instalar</button>

    </div>

  <!-- ============================================ -->
  <!-- MODAL CONTAINER -->
  <!-- ============================================ -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- OFFLINE INDICATOR -->
  <!-- ============================================ -->
  <div id="offline-indicator" class="offline-indicator" style="display: none;">
    <span>📡</span> Sin conexión - Modo offline
  </div>

  <!-- ============================================ -->
  <!-- SCRIPTS -->
  <!-- ============================================ -->
  <script>
    // ============================================
    // Service Worker Registration
    // ============================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/service-worker.js');
          console.log('[App] SW registered:', registration.scope);

          // Listen for updates
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showToast('Nueva versión disponible. Recargá para actualizar.', 'info');
              }
            });
          });
        } catch (err) {
          console.error('[App] SW registration failed:', err);
        }
      });
    }

    // ============================================
    // PWA Install Prompt
    // ============================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install banner after a delay
      setTimeout(() => {
        const banner = document.getElementById('install-prompt');
        if (banner) {
          banner.style.display = 'block';
          banner.classList.add('animate-slideUp');
        }
      }, 5000);
    });

    document.getElementById('install-accept')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('[App] Install prompt outcome:', outcome);
        deferredPrompt = null;
        document.getElementById('install-prompt').style.display = 'none';
      }
    });

    document.getElementById('install-dismiss')?.addEventListener('click', () => {
      document.getElementById('install-prompt').style.display = 'none';
    });

    // ============================================
    // Splash Screen
    // ============================================
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
        }
      }, 2000);
    });

    // ============================================
    // Simple Hash Router
    // ============================================
    const views = ['inicio', 'pronosticos', 'ranking', 'estadisticas', 'config'];
    const viewContainer = document.getElementById('view-container');
    const navItems = document.querySelectorAll('.nav-item');

    function navigateTo(viewName) {
      if (!views.includes(viewName)) viewName = 'inicio';
      
      // Update URL hash
      window.location.hash = viewName === 'inicio' ? '' : viewName;

      // Update active nav
      navItems.forEach(item => {
        item.classList.toggle('active', item.dataset.view === viewName);
      });

      // Animate view transition
      viewContainer.classList.add('view-exit');
      setTimeout(() => {
        renderView(viewName);
        viewContainer.classList.remove('view-exit');
        viewContainer.classList.add('view-enter');
        setTimeout(() => viewContainer.classList.remove('view-enter'), 300);
      }, 150);
    }

    function renderView(viewName) {
      const content = getViewContent(viewName);
      viewContainer.innerHTML = content;
    }

    function getViewContent(viewName) {
      switch (viewName) {
        case 'inicio':
          return `
            <div class="view-home">
              <div class="welcome-card card">
                <h2 class="text-gold" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem;">¡Bienvenido al PRODE!</h2>
                <p class="text-muted" style="margin-top: 8px;">Mundial de Fútbol 2026 🏆</p>
              </div>

              <div class="section-title">
                <h3>⏱️ Próximo Partido</h3>
              </div>
              <div class="match-card card">
                <div class="match-card-header">
                  <span class="badge badge-live">Fase de Grupos</span>
                  <span class="text-muted" style="font-size: 12px;">11 Jun 2026 - 13:00</span>
                </div>
                <div class="match-card-body">
                  <div class="match-team">
                    <div class="team-flag-placeholder">🇲🇽</div>
                    <span class="team-name">México</span>
                  </div>
                  <div class="match-score-area">
                    <span class="match-vs">VS</span>
                  </div>
                  <div class="match-team">
                    <div class="team-flag-placeholder">🇦🇷</div>
                    <span class="team-name">Argentina</span>
                  </div>
                </div>
                <div class="match-card-footer">
                  <div class="countdown" id="next-match-countdown">
                    <div class="countdown-unit">
                      <span class="countdown-value" id="cd-days">09</span>
                      <span class="countdown-label">Días</span>
                    </div>
                    <div class="countdown-unit">
                      <span class="countdown-value" id="cd-hours">15</span>
                      <span class="countdown-label">Horas</span>
                    </div>
                    <div class="countdown-unit">
                      <span class="countdown-value" id="cd-mins">32</span>
                      <span class="countdown-label">Min</span>
                    </div>
                    <div class="countdown-unit">
                      <span class="countdown-value" id="cd-secs">47</span>
                      <span class="countdown-label">Seg</span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="section-title">
                <h3>📊 Tu Resumen</h3>
              </div>
              <div class="stats-grid">
                <div class="stat-card card">
                  <span class="stat-label">Puntos</span>
                  <span class="stat-value text-gold">0</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Posición</span>
                  <span class="stat-value">-</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Aciertos</span>
                  <span class="stat-value text-success">0%</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Racha</span>
                  <span class="stat-value">0 🔥</span>
                </div>
              </div>

              <div class="section-title">
                <h3>🏆 Top 3 Ranking</h3>
              </div>
              <div class="card">
                <div class="ranking-item" style="background: linear-gradient(90deg, rgba(197,165,90,0.15) 0%, transparent 100%);">
                  <span class="ranking-position gold">1</span>
                  <span class="ranking-name">Esperando participantes...</span>
                  <span class="ranking-points text-gold">-</span>
                </div>
              </div>
            </div>
          `;

        case 'pronosticos':
          return `
            <div class="view-predictions">
              <div class="tab-bar">
                <button class="tab-item active">Todos</button>
                <button class="tab-item">Fase de Grupos</button>
                <button class="tab-item">Octavos</button>
                <button class="tab-item">Cuartos</button>
                <button class="tab-item">Semifinal</button>
                <button class="tab-item">Final</button>
              </div>

              <div class="section-title" style="margin-top: 16px;">
                <h3>⚽ Próximos Partidos</h3>

              <div class="match-card card">

                  <span class="text-muted" style="font-size: 12px;">11 Jun - 13:00</span>
                </div>

                    <div class="team-flag-placeholder">🇲🇽</div>
                    <span class="team-name">México</span>
                  </div>
                  <div class="match-score-area">
                    <input type="number" class="input-score" min="0" max="20" placeholder="-" aria-label="Goles México">

                    <input type="number" class="input-score" min="0" max="20" placeholder="-" aria-label="Goles Argentina">
                  </div>
                  <div class="match-team">
                    <div class="team-flag-placeholder">🇦🇷</div>
                    <span class="team-name">Argentina</span>
                  </div>
                </div>
                <div class="match-card-footer">
                  <button class="btn btn-gold btn-block btn-sm">Guardar Pronóstico</button>

              </div>

              <div class="match-card card">
                <div class="match-card-header">
                  <span class="badge">Grupo B</span>
                  <span class="text-muted" style="font-size: 12px;">11 Jun - 16:00</span>
                </div>
                <div class="match-card-body">
                  <div class="match-team">
                    <div class="team-flag-placeholder">🇧🇷</div>
                    <span class="team-name">Brasil</span>
                  </div>
                  <div class="match-score-area">
                    <input type="number" class="input-score" min="0" max="20" placeholder="-" aria-label="Goles Brasil">
                    <span class="match-divider">:</span>
                    <input type="number" class="input-score" min="0" max="20" placeholder="-" aria-label="Goles España">
                  </div>
                  <div class="match-team">
                    <div class="team-flag-placeholder">🇪🇸</div>
                    <span class="team-name">España</span>
                  </div>
                </div>
                <div class="match-card-footer">
                  <button class="btn btn-gold btn-block btn-sm">Guardar Pronóstico</button>
                </div>
              </div>

              <p class="text-muted text-center" style="margin-top: 24px; font-size: 13px;">Los pronósticos se bloquean 1 hora antes del partido</p>
            </div>
          `;

        case 'ranking':
          return `
            <div class="view-ranking">
              <div class="section-title">
                <h3>🏆 Podio</h3>
              </div>
              <div class="podium">
                <div class="podium-place podium-second">
                  <div class="podium-avatar">🥈</div>
                  <span class="podium-name">-</span>
                  <span class="podium-points">0 pts</span>
                  <div class="podium-bar"></div>
                </div>
                <div class="podium-place podium-first">
                  <div class="podium-avatar">🥇</div>
                  <span class="podium-name">-</span>
                  <span class="podium-points">0 pts</span>
                  <div class="podium-bar"></div>
                </div>
                <div class="podium-place podium-third">
                  <div class="podium-avatar">🥉</div>
                  <span class="podium-name">-</span>
                  <span class="podium-points">0 pts</span>
                  <div class="podium-bar"></div>
                </div>
              </div>

              <div class="section-title" style="margin-top: 24px;">
                <h3>📋 Tabla Completa</h3>
              </div>
              <div class="card" style="padding: 0; overflow: hidden;">
                <div class="ranking-item" style="background: linear-gradient(90deg, rgba(197,165,90,0.12) 0%, transparent 100%);">
                  <span class="ranking-position gold">1</span>
                  <span class="ranking-name">Esperando...</span>
                  <span class="ranking-points text-gold">-</span>
                </div>
                <div class="ranking-item">
                  <span class="ranking-position silver">2</span>
                  <span class="ranking-name">Esperando...</span>
                  <span class="ranking-points">-</span>
                </div>
                <div class="ranking-item">
                  <span class="ranking-position bronze">3</span>
                  <span class="ranking-name">Esperando...</span>
                  <span class="ranking-points">-</span>
                </div>
              </div>
            </div>
          `;

        case 'estadisticas':
          // Expert mode: show full advanced stats
          if (document.body.classList.contains('expert-mode')) {
            return `
              <div class="view-stats">
                <div class="section-title">
                  <h3>📊 Estadísticas Avanzadas</h3>
                  <span class="badge badge-gold" style="margin-left: 8px;">🧠 PRO</span>
                </div>
                <div class="stats-grid">
                  <div class="stat-card card">
                    <span class="stat-label">Partidos Jugados</span>
                    <span class="stat-value">0</span>
                  </div>
                  <div class="stat-card card">
                    <span class="stat-label">Goles Totales</span>
                    <span class="stat-value text-gold">0</span>
                  </div>
                  <div class="stat-card card">
                    <span class="stat-label">Promedio Goles</span>
                    <span class="stat-value">0.0</span>
                  </div>
                  <div class="stat-card card">
                    <span class="stat-label">Participantes</span>
                    <span class="stat-value">0</span>
                  </div>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                  <h3>🎯 Tu Rendimiento</h3>
                </div>
                <div class="card">
                  <div class="performance-bar">
                    <div class="performance-label">Resultados exactos</div>
                    <div class="performance-track">
                      <div class="performance-fill" style="width: 0%;"></div>
                    </div>
                    <span class="performance-value">0%</span>
                  </div>
                  <div class="performance-bar">
                    <div class="performance-label">Ganador correcto</div>
                    <div class="performance-track">
                      <div class="performance-fill" style="width: 0%;"></div>
                    </div>
                    <span class="performance-value">0%</span>
                  </div>
                  <div class="performance-bar">
                    <div class="performance-label">Diferencia de gol</div>
                    <div class="performance-track">
                      <div class="performance-fill" style="width: 0%;"></div>
                    </div>
                    <span class="performance-value">0%</span>
                  </div>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                  <h3>⚽ Estadísticas de Partidos</h3>
                </div>
                <div class="card">
                  <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="stat-card">
                      <span class="stat-label">Posesión Prom.</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                    <div class="stat-card">
                      <span class="stat-label">Tiros al Arco</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                    <div class="stat-card">
                      <span class="stat-label">xG Promedio</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                    <div class="stat-card">
                      <span class="stat-label">Córners</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                    <div class="stat-card">
                      <span class="stat-label">Faltas</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                    <div class="stat-card">
                      <span class="stat-label">Tarjetas</span>
                      <span class="stat-value" style="font-size: 1.4rem;">-</span>
                    </div>
                  </div>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                  <h3>📈 H2H & Rankings FIFA</h3>
                </div>
                <div class="card">
                  <p class="text-muted text-center" style="padding: 24px 0; font-size: 13px;">Los datos de H2H y rankings FIFA se cargarán cuando comience el mundial</p>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                  <h3>👟 Forma de Equipos</h3>
                </div>
                <div class="card">
                  <p class="text-muted text-center" style="padding: 24px 0; font-size: 13px;">La forma de los equipos se actualizará con los resultados del mundial</p>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                  <h3>🏅 Insignias</h3>
                </div>
                <div class="badges-grid">
                  <div class="badge-card card">
                    <span class="badge-icon">🔮</span>
                    <span class="badge-name">Vidente</span>
                    <span class="badge-desc text-muted">3 exactos seguidos</span>
                    <span class="badge badge-locked">Bloqueada</span>
                  </div>
                  <div class="badge-card card">
                    <span class="badge-icon">🔥</span>
                    <span class="badge-name">En Racha</span>
                    <span class="badge-desc text-muted">5 aciertos seguidos</span>
                    <span class="badge badge-locked">Bloqueada</span>
                  </div>
                  <div class="badge-card card">
                    <span class="badge-icon">👑</span>
                    <span class="badge-name">Rey del Prode</span>
                    <span class="badge-desc text-muted">1ro en el ranking</span>
                    <span class="badge badge-locked">Bloqueada</span>
                  </div>
                </div>
              </div>
            `;
          }

          // Simple mode: show simplified stats
          return `
            <div class="view-stats">
              <div class="section-title">
                <h3>📊 Estadísticas</h3>
              </div>
              <div class="stats-grid">
                <div class="stat-card card">
                  <span class="stat-label">Partidos Jugados</span>
                  <span class="stat-value">0</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Goles Totales</span>
                  <span class="stat-value text-gold">0</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Promedio Goles</span>
                  <span class="stat-value">0.0</span>
                </div>
                <div class="stat-card card">
                  <span class="stat-label">Participantes</span>
                  <span class="stat-value">0</span>
                </div>
              </div>

              <div class="card" style="margin-top: 16px; text-align: center; padding: 24px;">
                <span style="font-size: 32px;">🧠</span>
                <p class="text-muted" style="margin-top: 8px; font-size: 13px;">Activá el <strong class="text-gold">Modo Experto</strong> para ver estadísticas avanzadas: posesión, xG, H2H, rankings FIFA y más.</p>
                <button class="btn btn-outline btn-sm" style="margin-top: 12px;" onclick="toggleExpertMode()">Activar Modo PRO</button>
              </div>

              <div class="section-title" style="margin-top: 24px;">
                <h3>🏅 Insignias</h3>
              </div>
              <div class="badges-grid">
                <div class="badge-card card">
                  <span class="badge-icon">🔮</span>
                  <span class="badge-name">Vidente</span>
                  <span class="badge-desc text-muted">3 exactos seguidos</span>
                  <span class="badge badge-locked">Bloqueada</span>
                </div>
                <div class="badge-card card">
                  <span class="badge-icon">🔥</span>
                  <span class="badge-name">En Racha</span>
                  <span class="badge-desc text-muted">5 aciertos seguidos</span>
                  <span class="badge badge-locked">Bloqueada</span>
                </div>
                <div class="badge-card card">
                  <span class="badge-icon">👑</span>
                  <span class="badge-name">Rey del Prode</span>
                  <span class="badge-desc text-muted">1ro en el ranking</span>
                  <span class="badge badge-locked">Bloqueada</span>
                </div>
              </div>
            </div>
          `;

        case 'config':
          return `
            <div class="view-settings">
              <div class="section-title">
                <h3>⚙️ Configuración</h3>
              </div>

              <div class="card">
                <div class="settings-item">
                  <div class="settings-info">
                    <span class="settings-label">Notificaciones</span>
                    <span class="settings-desc text-muted">Recordatorios de partidos</span>
                  </div>
                  <label class="toggle">
                    <input type="checkbox" id="setting-notifications" checked>
                    <span class="toggle-slider"></span>
                  </label>
                </div>
                <div class="settings-item">
                  <div class="settings-info">
                    <span class="settings-label">Sonidos</span>
                    <span class="settings-desc text-muted">Efectos de sonido</span>
                  </div>
                  <label class="toggle">
                    <input type="checkbox" id="setting-sounds">
                    <span class="toggle-slider"></span>
                  </label>
                </div>
                <div class="settings-item">
                  <div class="settings-info">
                    <span class="settings-label">Modo Experto</span>
                    <span class="settings-desc text-muted">Estadísticas avanzadas</span>
                  </div>
                  <label class="toggle">
                    <input type="checkbox" id="setting-expert">
                    <span class="toggle-slider"></span>
                  </label>
                </div>
              </div>

              <div class="section-title" style="margin-top: 24px;">
                <h3>👤 Mi Perfil</h3>
              </div>
              <div class="card">
                <div class="form-group">
                  <label class="form-label" for="profile-name">Nombre</label>
                  <input type="text" class="form-input" id="profile-name" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                  <label class="form-label" for="profile-team">Equipo Favorito</label>
                  <select class="form-input form-select" id="profile-team">
                    <option value="">Seleccionar...</option>
                    <option value="ARG">🇦🇷 Argentina</option>
                    <option value="BRA">🇧🇷 Brasil</option>
                    <option value="MEX">🇲🇽 México</option>
                    <option value="USA">🇺🇸 Estados Unidos</option>
                    <option value="ESP">🇪🇸 España</option>
                    <option value="GER">🇩🇪 Alemania</option>
                    <option value="FRA">🇫🇷 Francia</option>
                    <option value="ENG">🏴 Inglaterra</option>
                  </select>
                </div>
                <button class="btn btn-gold btn-block" style="margin-top: 12px;">Guardar Perfil</button>
              </div>

              <div class="section-title" style="margin-top: 24px;">
                <h3>ℹ️ Acerca de</h3>
              </div>
              <div class="card">
                <p class="text-muted" style="font-size: 13px; line-height: 1.6;">PRODE Familiar - Mundial de Fútbol 2026<br>Versión 1.0.0</p>
                <p class="text-muted" style="font-size: 12px; margin-top: 8px;">Hecho con ❤️ para la familia</p>
              </div>
            </div>
          `;

        default:
          return '<div class="card"><p class="text-muted">Vista no encontrada</p></div>';
      }
    }

    // ============================================
    // Navigation handlers
    // ============================================
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        navigateTo(item.dataset.view);
      });
    });

    // Handle hash changes (back/forward)
    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.replace('#', '') || 'inicio';
      navigateTo(hash);
    });

    // Initial route
    window.addEventListener('load', () => {
      const hash = window.location.hash.replace('#', '') || 'inicio';
      setTimeout(() => navigateTo(hash), 2100); // After splash
    });

    // ============================================
    // Toast Notifications
    // ============================================
    function showToast(message, type = 'info', duration = 3000) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    // ============================================
    // Online/Offline detection
    // ============================================
    const offlineIndicator = document.getElementById('offline-indicator');

    window.addEventListener('online', () => {
      offlineIndicator.style.display = 'none';
      showToast('¡Conexión restaurada!', 'success');
    });

    window.addEventListener('offline', () => {
      offlineIndicator.style.display = 'flex';
      showToast('Sin conexión - Modo offline', 'warning');
    });

    // ============================================
    // Pull to Refresh
    // ============================================
    let touchStartY = 0;
    let touchEndY = 0;
    const appContent = document.getElementById('app-content');

    appContent.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    appContent.addEventListener('touchmove', (e) => {
      touchEndY = e.touches[0].clientY;
    }, { passive: true });

    appContent.addEventListener('touchend', () => {
      const diff = touchEndY - touchStartY;
      if (diff > 100 && appContent.scrollTop === 0) {
        showToast('Actualizando...', 'info', 1500);
        const currentView = window.location.hash.replace('#', '') || 'inicio';
        setTimeout(() => navigateTo(currentView), 800);
      }
    });

    // ============================================
    // Notification Bell
    // ============================================
    document.getElementById('notification-bell')?.addEventListener('click', () => {
      showToast('No hay notificaciones nuevas', 'info');
    });

    // ============================================
    // Modal helpers
    // ============================================
    function openModal(title, content) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').innerHTML = content;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.getElementById('modal-close')?.addEventListener('click', closeModal);
    document.getElementById('modal-overlay')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ============================================
    // Countdown Timer (demo)
    // ============================================
    function updateCountdown() {
      const target = new Date('2026-06-11T16:00:00Z');
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) return;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);

      const daysEl = document.getElementById('cd-days');
      const hoursEl = document.getElementById('cd-hours');
      const minsEl = document.getElementById('cd-mins');
      const secsEl = document.getElementById('cd-secs');

      if (daysEl) daysEl.textContent = String(days).padStart(2, '0');
      if (hoursEl) hoursEl.textContent = String(hours).padStart(2, '0');
      if (minsEl) minsEl.textContent = String(mins).padStart(2, '0');
      if (secsEl) secsEl.textContent = String(secs).padStart(2, '0');
    }

    setInterval(updateCountdown, 1000);

    // ============================================
    // Expert Mode Toggle
    // ============================================
    function toggleExpertMode() {
      const isExpert = document.body.classList.toggle('expert-mode');
      const toggle = document.getElementById('expert-toggle');
      const settingsToggle = document.getElementById('setting-expert');

      // Update header toggle appearance
      if (toggle) toggle.classList.toggle('active', isExpert);

      // Sync settings toggle if visible
      if (settingsToggle) settingsToggle.checked = isExpert;

      // Persist preference
      localStorage.setItem('prode-expert-mode', isExpert ? 'true' : 'false');

      // Show feedback
      showToast(
        isExpert ? '🧠 Modo Experto activado' : 'Modo Simple activado',
        isExpert ? 'success' : 'info'
      );

      // Re-render current view to update content
      const currentView = window.location.hash.replace('#', '') || 'inicio';
      renderView(currentView);
    }

    // Header toggle click
    document.getElementById('expert-toggle')?.addEventListener('click', toggleExpertMode);

    // Settings toggle sync (delegated since settings view is dynamic)
    document.addEventListener('change', (e) => {
      if (e.target && e.target.id === 'setting-expert') {
        const isExpert = e.target.checked;
        document.body.classList.toggle('expert-mode', isExpert);
        document.getElementById('expert-toggle')?.classList.toggle('active', isExpert);
        localStorage.setItem('prode-expert-mode', isExpert ? 'true' : 'false');
        showToast(
          isExpert ? '🧠 Modo Experto activado' : 'Modo Simple activado',
          isExpert ? 'success' : 'info'
        );
        // Re-render to reflect mode change
        const currentView = window.location.hash.replace('#', '') || 'inicio';
        renderView(currentView);
      }
    });

    // Restore expert mode on load
    if (localStorage.getItem('prode-expert-mode') === 'true') {
      document.body.classList.add('expert-mode');
      document.getElementById('expert-toggle')?.classList.add('active');
    }
  </script>
</body>
</html>
